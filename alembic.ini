# Alembic configuration file for SwarmEnterprise v2
# sqlalchemy.url is intentionally a placeholder — env.py reads DATABASE_URL from os.environ

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone used when rendering dates in migration filenames
# timezone =

# Max length of characters to apply to the slug field
truncate_slug_length = 40

# Set to "true" to run the environment during the "revision" command,
# inspecting the destination revision environment
revision_environment = false

# Set to "true" to allow .pyc and .pyo files without a source .py file to be
# detected as revisions in the versions/ directory
sourceless = false

# Version location specification; this defaults to alembic/versions.
version_locations = %(here)s/alembic/versions

# The output encoding used when revision files are written from script.py.mako
output_encoding = utf-8

# sqlalchemy.url is overridden by env.py via os.environ["DATABASE_URL"].
# Set to a placeholder so `alembic` CLI does not error when env.py handles it.
sqlalchemy.url = driver://

[post_write_hooks]
# Post-write hooks define scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for further
# detail and examples

# format using "black" — optionally enable
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
