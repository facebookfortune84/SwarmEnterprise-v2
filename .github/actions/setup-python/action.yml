name: "Setup Python + pip cache"
description: "Composite action: set up Python with pip caching and install requirements"

inputs:
  python-version:
    description: "Python version to install"
    required: false
    default: "3.11"
  requirements-file:
    description: "Path to requirements file"
    required: false
    default: "requirements.txt"
  extra-packages:
    description: "Additional packages to install (space-separated)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: ${{ inputs.requirements-file }}

    - name: Upgrade pip
      shell: bash
      run: python -m pip install --upgrade pip

    - name: Install from requirements
      shell: bash
      run: pip install -r "${{ inputs.requirements-file }}"

    - name: Install extra packages
      if: inputs.extra-packages != ''
      shell: bash
      run: pip install ${{ inputs.extra-packages }}
