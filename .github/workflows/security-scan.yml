name: "Security — Trivy Container + OWASP"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Every Tuesday at 07:00 UTC
    - cron: "0 7 * * 2"

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/swarmenterprise-backend

permissions:
  contents: read
  security-events: write
  packages: read

jobs:
  trivy-repo:
    name: "Trivy — Repository FS Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on repository filesystem
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-repo.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"  # Report only; blocking is done via SARIF upload

      - name: Upload Trivy SARIF (repo)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-repo.sarif"
          category: "trivy-repo"

  trivy-image:
    name: "Trivy — Docker Image Scan"
    runs-on: ubuntu-latest
    # Only runs on pushes to main where an image was just built
    if: github.event_name == 'push' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image locally (no push) for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          load: true
          tags: swarmenterprise-backend:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy on Docker image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "swarmenterprise-backend:scan"
          format: "sarif"
          output: "trivy-image.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy SARIF (image)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-image.sarif"
          category: "trivy-image"

      - name: Trivy — fail on CRITICAL CVEs in image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "swarmenterprise-backend:scan"
          format: "table"
          severity: "CRITICAL"
          exit-code: "1"
          ignore-unfixed: true

  owasp-dep-check:
    name: "OWASP Dependency Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: pip-audit scan
        run: |
          pip-audit \
            --requirement requirements.txt \
            --format json \
            --output pip-audit-report.json \
            --ignore-vuln PYSEC-2022-42969 \
            || true  # collect report even on findings

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 30

      - name: Fail on CRITICAL vulnerabilities
        run: |
          pip-audit \
            --requirement requirements.txt \
            --ignore-vuln PYSEC-2022-42969 \
            --fix --dry-run \
            || echo "[WARN] Vulnerabilities found — review pip-audit-report.json"
