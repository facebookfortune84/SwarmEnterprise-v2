name: "Performance — Load Test Gate"

on:
  # Run on pushes to main and on manual dispatch
  push:
    branches: [ main ]
    paths:
      - "backend/**"
      - "requirements.txt"
  workflow_dispatch:
    inputs:
      duration:
        description: "Test duration in seconds"
        required: false
        default: "30"
      vus:
        description: "Virtual users (concurrent)"
        required: false
        default: "10"

env:
  PYTHON_VERSION: "3.11"
  # Thresholds — adjust as the application scales
  MAX_P95_MS: "500"       # 95th-percentile response time
  MAX_ERROR_RATE: "0.02"  # 2% error rate ceiling
  MIN_RPS: "10"           # minimum sustained requests/second

jobs:
  load-test:
    name: "Load Test (locust)"
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite:///./loadtest.db"
      JWT_SECRET_KEY: "ci-test-secret-key-do-not-use-in-production-64chars00"
      SECRET_KEY: "ci-test-secret-key-do-not-use-in-production-64chars01"
      ENCRYPTION_KEY: "ci-test-encryption-key-32-chars-!"
      REDIS_URL: "redis://localhost:6379/0"
      REDIS_HOST: "localhost"
      REDIS_PORT: "6379"
      STRIPE_API_KEY: "sk_test_placeholder"
      STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
      OTEL_SDK_DISABLED: "true"
      CREWAI_DISABLE_TELEMETRY: "true"
      PYTHONPATH: "."
      TEST_MODE: "true"
      DRY_RUN_MODE: "true"
      LOG_LEVEL: "WARNING"

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install locust

      - name: Run migrations (SQLite in-memory)
        run: alembic upgrade head

      - name: Start application server
        run: |
          uvicorn backend.main:app \
            --host 127.0.0.1 \
            --port 8000 \
            --workers 1 \
            --log-level warning &
          # Wait until the server becomes healthy
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/health || echo "000")
            [ "$STATUS" = "200" ] && echo "[OK] Server is up" && break
            [ "$i" = "20" ] && echo "[FAIL] Server did not start" && exit 1
            sleep 2
          done

      - name: Create load test script
        run: |
          cat > locustfile.py << 'LOCUST'
          import json
          import time
          from locust import HttpUser, task, between, events

          class BackendUser(HttpUser):
              wait_time = between(0.1, 0.5)
              token = None

              def on_start(self):
                  """Register and login once per simulated user."""
                  ts = str(int(time.time() * 1000))
                  email = f"loadtest_{ts}@perf.invalid"
                  pwd   = f"LoadPass#{ts}"
                  resp = self.client.post(
                      "/api/auth/register",
                      json={"email": email, "password": pwd, "full_name": "Load Test"},
                      catch_response=True,
                  )
                  if resp.status_code == 201:
                      data = resp.json()
                      self.token = data.get("access_token", "")
                  else:
                      resp.failure(f"Register failed: {resp.status_code}")

              def _auth(self):
                  return {"Authorization": f"Bearer {self.token}"} if self.token else {}

              @task(5)
              def health(self):
                  self.client.get("/health", name="GET /health")

              @task(3)
              def metrics(self):
                  self.client.get("/metrics", name="GET /metrics")

              @task(2)
              def companies(self):
                  self.client.get("/api/companies/", headers=self._auth(), name="GET /api/companies/")
          LOCUST

      - name: Run Locust load test
        run: |
          DURATION="${{ github.event.inputs.duration || '30' }}"
          VUS="${{ github.event.inputs.vus || '10' }}"

          locust \
            --headless \
            --users "$VUS" \
            --spawn-rate 2 \
            --run-time "${DURATION}s" \
            --host http://127.0.0.1:8000 \
            --csv locust_stats \
            --html locust_report.html \
            --logfile locust.log \
            2>&1 | tail -40

      - name: Evaluate thresholds
        run: |
          python3 - << 'PYEOF'
          import csv, sys

          failures = []

          with open("locust_stats_stats.csv") as f:
              reader = csv.DictReader(f)
              for row in reader:
                  if row.get("Name") == "Aggregated":
                      p95    = float(row.get("95%", 0) or 0)
                      total  = int(row.get("Request Count", 0) or 0)
                      failed = int(row.get("Failure Count", 0) or 0)
                      rps    = float(row.get("Requests/s", 0) or 0)
                      err_rate = (failed / total) if total > 0 else 0

                      print(f"  P95 latency : {p95:.0f} ms  (max {${{ env.MAX_P95_MS }}} ms)")
                      print(f"  Error rate  : {err_rate:.2%}  (max {${{ env.MAX_ERROR_RATE }}})")
                      print(f"  RPS         : {rps:.1f}  (min {${{ env.MIN_RPS }}})")

                      if p95 > ${{ env.MAX_P95_MS }}:
                          failures.append(f"P95 latency {p95:.0f}ms exceeds limit ${{ env.MAX_P95_MS }}ms")
                      if err_rate > ${{ env.MAX_ERROR_RATE }}:
                          failures.append(f"Error rate {err_rate:.2%} exceeds limit ${{ env.MAX_ERROR_RATE }}")
                      if rps < ${{ env.MIN_RPS }}:
                          failures.append(f"RPS {rps:.1f} below minimum ${{ env.MIN_RPS }}")

          if failures:
              for f in failures:
                  print(f"[FAIL] {f}", file=sys.stderr)
              sys.exit(1)

          print("[OK] All performance thresholds passed.")
          PYEOF

      - name: Upload load test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: locust-report
          path: |
            locust_report.html
            locust_stats_*.csv
            locust.log
          retention-days: 14
