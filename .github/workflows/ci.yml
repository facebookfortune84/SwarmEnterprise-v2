name: CI — Lint · Type-check · Unit Tests · Sovereign Tests · Security · Build · Migration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ============================================================
  # Stage 1 + 2: Install (with caching) & Lint
  # ============================================================
  lint:
    name: "Lint (ruff + black)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: ruff check
        run: ruff check .

      - name: black format check
        run: black --check .

  # ============================================================
  # Stage 3: Static Type Checking (mypy)
  # ============================================================
  typecheck:
    name: "Type Check (mypy)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy types-requests types-redis

      - name: Run mypy
        # Ignore missing stubs for third-party packages not yet typed
        run: |
          mypy backend/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --exclude 'backend/alembic' \
            || true  # non-blocking until type coverage is complete

  # ============================================================
  # Stage 4: Unit Tests with Coverage
  # ============================================================
  unit-tests:
    name: "Unit Tests + Coverage"
    runs-on: ubuntu-latest
    needs: lint
    env:
      DATABASE_URL: "sqlite:///./test.db"
      JWT_SECRET_KEY: "ci-test-secret-key-do-not-use-in-production-64chars00"
      SECRET_KEY: "ci-test-secret-key-do-not-use-in-production-64chars01"
      ENCRYPTION_KEY: "ci-test-encryption-key-32-chars-!"
      REDIS_URL: "redis://localhost:6379/0"
      REDIS_HOST: "localhost"
      REDIS_PORT: "6379"
      STRIPE_API_KEY: "sk_test_placeholder"
      STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
      OTEL_SDK_DISABLED: "true"
      CREWAI_DISABLE_TELEMETRY: "true"
      PYTHONPATH: "."
      LOG_LEVEL: "WARNING"
      TEST_MODE: "true"
      DRY_RUN_MODE: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests with coverage
        run: |
          pytest tests/ \
            --ignore=tests/test_live_factory.py \
            --ignore=tests/test_live_marketing.py \
            --ignore=tests/test_commander.py \
            --ignore=tests/test_company_generator.py \
            --ignore=tests/test_deployment_service.py \
            -v --tb=short \
            --cov=backend \
            --cov=agents \
            --cov-report=term-missing \
            --cov-report=xml:coverage_unit.xml \
            --cov-fail-under=90 \
            -q

      - name: Verify new agent files have corresponding tests
        run: |
          python - << 'PYEOF'
          import os, sys, pathlib
          root = pathlib.Path(".")
          missing = []
          for py_file in (root / "agents").rglob("*.py"):
              if py_file.name.startswith("_"):
                  continue
              stem = py_file.stem
              test_path_agents = root / "tests" / "agents" / f"test_{stem}.py"
              test_path_unit   = root / "tests" / "unit" / "agents" / f"test_{stem}.py"
              if not test_path_agents.exists() and not test_path_unit.exists():
                  missing.append(str(py_file))
          if missing:
              print("[WARN] Agent files missing tests (not blocking):")
              for f in missing:
                  print(f"  {f}")
          else:
              print("[OK] All agent files have corresponding test files.")
          PYEOF

      - name: Upload unit coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage_unit.xml
          retention-days: 14

  # ============================================================
  # Stage 5a: DB + Factory Integration Tests (existing sovereign suite)
  # ============================================================
  integration-tests-existing:
    name: "Integration Tests (db + factory)"
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      DATABASE_URL: "sqlite:///./integration_test.db"
      JWT_SECRET_KEY: "ci-test-secret-key-do-not-use-in-production-64chars00"
      SECRET_KEY: "ci-test-secret-key-do-not-use-in-production-64chars01"
      ENCRYPTION_KEY: "ci-test-encryption-key-32-chars-!"
      REDIS_URL: "redis://localhost:6379/0"
      REDIS_HOST: "localhost"
      REDIS_PORT: "6379"
      OTEL_SDK_DISABLED: "true"
      CREWAI_DISABLE_TELEMETRY: "true"
      PYTHONPATH: "."
      TEST_MODE: "true"
      DRY_RUN_MODE: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run existing sovereign integration tests
        run: |
          pytest \
            tests_sovereign/test_db_integration.py \
            tests_sovereign/test_factory_orchestration.py \
            -v --tb=short -s

  # ============================================================
  # Stage 5b: API + WorkflowService sovereign tests (new suite)
  #   — requires no running Redis / Celery broker
  #   — all external I/O mocked via unittest.mock.patch
  # ============================================================
  sovereign-tests:
    name: "Sovereign Tests (API + WorkflowService) + Coverage Gate"
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      # SQLite in-memory — no Postgres/Redis required
      DATABASE_URL: "sqlite://"
      SWARM_DB_URL: "sqlite://"
      JWT_SECRET_KEY: "ci-test-secret-key-do-not-use-in-production-64chars00"
      SECRET_KEY: "ci-test-secret-key-do-not-use-in-production-64chars01"
      ENCRYPTION_KEY: "ci-test-encryption-key-32-chars-!"
      # Celery / Redis are fully mocked; these values are never dialled
      REDIS_URL: "redis://localhost:6379/0"
      REDIS_HOST: "localhost"
      REDIS_PORT: "6379"
      CELERY_BROKER_URL: "memory://"
      CELERY_RESULT_BACKEND: "cache+memory://"
      STRIPE_API_KEY: "sk_test_placeholder"
      STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
      OTEL_SDK_DISABLED: "true"
      CREWAI_DISABLE_TELEMETRY: "true"
      PYTHONPATH: "."
      LOG_LEVEL: "WARNING"
      TEST_MODE: "true"
      DRY_RUN_MODE: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        # Install from the public PyPI index only — no proprietary registry
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run sovereign API + WorkflowService tests with coverage
        run: |
          pytest \
            tests_sovereign/test_api.py \
            tests_sovereign/test_workflow_service.py \
            -v --tb=short \
            --cov=backend/api \
            --cov=backend/services/workflow_service \
            --cov=backend/notifications \
            --cov-report=term-missing \
            --cov-report=xml:coverage_sovereign.xml \
            --cov-fail-under=90

      - name: Upload sovereign coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-sovereign
          path: coverage_sovereign.xml
          retention-days: 14

  # ============================================================
  # Stage 6: Security Scanning (bandit + pip-audit)
  # ============================================================
  security:
    name: "Security Scan (bandit + pip-audit)"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
          pip install -r requirements.txt --quiet

      - name: Run bandit (SAST)
        run: |
          bandit -r backend/ agents/ \
            -x tests/,tests_sovereign/ \
            -ll \
            --format json \
            --output bandit-report.json \
            || true  # non-blocking — report only
          bandit -r backend/ agents/ \
            -x tests/,tests_sovereign/ \
            -ll

      - name: Run pip-audit (Python dependency CVEs)
        run: pip-audit --requirement requirements.txt --ignore-vuln PYSEC-2022-42969 || true

      - name: Run npm audit (Node.js dependency CVEs)
        run: |
          if [ -f package.json ]; then
            npm audit --audit-level=high || true
          else
            echo "No package.json found — skipping npm audit"
          fi

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  # ============================================================
  # Stage 8: Environment Variable Validation
  # ============================================================
  env-validation:
    name: "Env Var Validation"
    runs-on: ubuntu-latest
    needs: lint
    env:
      DATABASE_URL: "sqlite:///./env_check.db"
      JWT_SECRET_KEY: "ci-test-secret-key-do-not-use-in-production-64chars00"
      SECRET_KEY: "ci-test-secret-key-do-not-use-in-production-64chars01"
      ENCRYPTION_KEY: "ci-test-encryption-key-32-chars-!"
      REDIS_URL: "redis://localhost:6379/0"
      STRIPE_API_KEY: "sk_test_placeholder"
      STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
      SMTP_SERVER: "smtp.example.com"
      SMTP_USER: "test@example.com"
      SMTP_PASS: "testpass"
      PYTHONPATH: "."

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate env vars (validate_env.py)
        run: python scripts/validate_env.py || true

      - name: Validate config loads cleanly
        run: |
          python -c "
          import os
          os.environ['PYTHONPATH'] = '.'
          from backend.config import settings, get_settings
          s = get_settings()
          assert s.database.url, 'DATABASE_URL must not be empty'
          assert s.jwt.secret_key, 'JWT_SECRET_KEY must not be empty'
          print('[OK] Config loaded successfully')
          print(f'[OK] DB: {s.database.url[:40]}...')
          print(f'[OK] JWT expire: {s.jwt.access_token_expire_minutes}m')
          "

  # ============================================================
  # Stage 9: Database Migration Dry-Run
  # ============================================================
  migration-check:
    name: "DB Migration Dry-Run"
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      PYTHONPATH: "."

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Alembic upgrade + downgrade (SQLite)
        run: |
          export DATABASE_URL="sqlite:///./test_migration.db"
          alembic upgrade head
          echo "[OK] upgrade head succeeded"
          alembic downgrade base
          echo "[OK] downgrade base succeeded"
          rm -f test_migration.db

  # ============================================================
  # Stage 10: Docker Build verification
  # ============================================================
  build:
    name: "Docker Build (backend image)"
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: swarmenterprise-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify frontend static assets
        run: |
          echo "Checking frontend static files…"
          test -f frontend/public/index.html   && echo "[OK] index.html"
          test -f frontend/public/config.js    && echo "[OK] config.js"
          test -f frontend/public/api-client.js && echo "[OK] api-client.js"
          test -f frontend/public/analytics.js  && echo "[OK] analytics.js"
          echo "[OK] Frontend assets verified."


  # ============================================================
  # Stage 11: Frontend SPA Tests + Coverage + Bundle Size
  # ============================================================
  frontend-test:
    name: "Frontend Tests (Vitest + Coverage + Bundle Size)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Run Vitest with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-frontend
          path: frontend/coverage/
          retention-days: 30

      - name: Build frontend for production
        run: npm run build

      - name: Check bundle size (≤ 400 KB gzip for dashboard entry)
        run: |
          python3 - << 'PYEOF'
          import os, gzip, sys

          dist_dir = "dist/assets"
          if not os.path.isdir(dist_dir):
              print("[SKIP] No dist/assets directory found — skipping bundle size check.")
              sys.exit(0)

          total_bytes = 0
          for fname in os.listdir(dist_dir):
              if fname.endswith(".js") and not fname.endswith(".map"):
                  fpath = os.path.join(dist_dir, fname)
                  with open(fpath, "rb") as f:
                      compressed = len(gzip.compress(f.read()))
                  total_bytes += compressed
                  print(f"  {fname}: {compressed / 1024:.1f} KB gzip")

          limit = 400 * 1024  # 400 KB
          print(f"Total: {total_bytes / 1024:.1f} KB gzip (limit {limit / 1024:.0f} KB)")
          if total_bytes > limit:
              print(f"[FAIL] Bundle exceeds 400 KB gzip limit!", file=sys.stderr)
              sys.exit(1)
          print("[OK] Bundle size within limit.")
          PYEOF

      - name: Verify component test files exist
        run: |
          python3 - << 'PYEOF'
          import os, sys, pathlib
          root = pathlib.Path("src/components")
          if not root.exists():
              print("[SKIP] No src/components directory.")
              sys.exit(0)
          missing = []
          for tsx in root.rglob("*.tsx"):
              if "__tests__" in tsx.parts or tsx.name.startswith("_"):
                  continue
              # Each component should have a co-located __tests__/ComponentName.test.tsx
              component_name = tsx.stem
              test_file = tsx.parent / "__tests__" / f"{component_name}.test.tsx"
              if not test_file.exists():
                  missing.append(str(tsx))
          if missing:
              print("[WARN] Components without test files (not blocking):")
              for f in missing:
                  print(f"  {f}")
          else:
              print("[OK] All components have test files.")
          PYEOF


