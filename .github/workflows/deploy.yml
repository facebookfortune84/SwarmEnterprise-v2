# CD Pipeline — Build · Push · Stage · Smoke · Production Gate
# Triggered on push to main or version tags.
# Required secrets: DOCKER_REGISTRY_USER, DOCKER_REGISTRY_PASSWORD,
#   SSH_DEPLOY_HOST, SSH_DEPLOY_USER, SSH_DEPLOY_PRIVATE_KEY,
#   JWT_SECRET_KEY, SECRET_KEY, ENCRYPTION_KEY, POSTGRES_PASSWORD,
#   PRIMARY_DOMAIN

name: "CD — Build · Stage · Smoke · Prod Gate"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [ staging, production ]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/swarmenterprise-backend
  PYTHON_VERSION: "3.11"

jobs:

  # ============================================================
  # Stage 7: Docker Build and Push
  # ============================================================
  build-and-push:
    name: "Docker Build + Push"
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      - name: Image digest
        run: echo "Image digest -> ${{ steps.build.outputs.digest }}"

  # ============================================================
  # Stage 10: Staging Deployment
  # ============================================================
  deploy-staging:
    name: "Deploy to Staging"
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: https://staging.${{ secrets.PRIMARY_DOMAIN }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_DEPLOY_HOST }}
          username: ${{ secrets.SSH_DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            DEPLOY_DIR=/srv/swarmenterprise-staging
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            # Update repo
            if [ -d .git ]; then
              git fetch --all --prune
              git reset --hard origin/main
            else
              git clone https://github.com/${{ github.repository }} .
            fi

            # Pull new image
            export BACKEND_IMAGE="${{ env.IMAGE_NAME }}:${{ github.sha }}"
            echo "BACKEND_IMAGE=${BACKEND_IMAGE}" >> .env.staging

            # Run migrations before restart
            docker run --rm \
              --env-file .env.staging \
              -e DATABASE_URL="${DATABASE_URL}" \
              -e PYTHONPATH=/app \
              "${BACKEND_IMAGE}" \
              alembic upgrade head

            # Restart staging stack
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              --env-file .env.staging \
              --profile postgres --profile workers \
              up -d --remove-orphans --pull always

            echo "[OK] Staging deployment complete"

  # ============================================================
  # Stage 11: Smoke Tests against Staging
  # ============================================================
  smoke-staging:
    name: "Smoke Tests — Staging"
    runs-on: ubuntu-latest
    needs: deploy-staging
    env:
      BASE_URL: "https://staging.${{ secrets.PRIMARY_DOMAIN }}"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Wait for staging to become healthy
        run: |
          echo "Waiting for ${BASE_URL}/health ..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${BASE_URL}/health" || echo "000")
            echo "  Attempt ${i}: HTTP ${STATUS}"
            if [ "$STATUS" = "200" ]; then
              echo "[OK] Staging is healthy"
              break
            fi
            if [ "$i" = "20" ]; then
              echo "[FAIL] Staging did not become healthy after 60s"
              exit 1
            fi
            sleep 3
          done

      - name: Run smoke test script
        run: |
          chmod +x scripts/smoke_test.sh
          ./scripts/smoke_test.sh "${BASE_URL}"
        continue-on-error: false

      - name: Run Python smoke assertions
        run: |
          python -c "
          import urllib.request, json, sys

          base = '${{ env.BASE_URL }}'
          tests = [
              ('GET /health',       f'{base}/health',       200, 'ONLINE'),
              ('GET /metrics',      f'{base}/metrics',      200, '# HELP'),
              ('GET /docs',         f'{base}/docs',         200, 'swagger'),
          ]
          failures = []
          for name, url, expect_code, expect_body in tests:
              try:
                  with urllib.request.urlopen(url, timeout=10) as r:
                      body = r.read().decode()
                      code = r.status
              except Exception as e:
                  failures.append(f'FAIL {name}: {e}')
                  continue
              if code != expect_code:
                  failures.append(f'FAIL {name}: expected {expect_code}, got {code}')
              elif expect_body.lower() not in body.lower():
                  failures.append(f'FAIL {name}: body missing \"{expect_body}\"')
              else:
                  print(f'PASS {name} ({code})')

          if failures:
              for f in failures:
                  print(f, file=sys.stderr)
              sys.exit(1)
          print('[OK] All smoke tests passed')
          "

  # ============================================================
  # Stage 12: Production Deployment Gate (manual approval)
  # ============================================================
  deploy-production:
    name: "Deploy to Production"
    runs-on: ubuntu-latest
    needs: smoke-staging
    environment:
      name: production
      url: https://${{ secrets.PRIMARY_DOMAIN }}
    # GitHub Environments with required reviewers provide the manual approval gate.
    # Configure: Settings → Environments → production → Required reviewers

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_DEPLOY_HOST }}
          username: ${{ secrets.SSH_DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            DEPLOY_DIR=/srv/swarmenterprise
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            # Update repo to exact commit SHA
            if [ -d .git ]; then
              git fetch --all --prune
              git checkout ${{ github.sha }}
            else
              git clone https://github.com/${{ github.repository }} .
              git checkout ${{ github.sha }}
            fi

            # Tag image with production label
            export BACKEND_IMAGE="${{ env.IMAGE_NAME }}:${{ github.sha }}"

            # Run migrations (idempotent)
            docker run --rm \
              --env-file .env \
              -e PYTHONPATH=/app \
              "${BACKEND_IMAGE}" \
              alembic upgrade head

            # Zero-downtime rolling restart
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              --profile postgres --profile proxy --profile workers \
              up -d --remove-orphans --pull always

            # Verify production health
            sleep 15
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || echo "000")
            if [ "$STATUS" != "200" ]; then
              echo "[FAIL] Production health check returned ${STATUS}"
              exit 1
            fi
            echo "[OK] Production deployment complete — SHA ${{ github.sha }}"

      - name: Post-deploy smoke test (production)
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ secrets.PRIMARY_DOMAIN }}/health" || echo "000")
          echo "Production /health → HTTP ${STATUS}"
          [ "$STATUS" = "200" ] || exit 1

      - name: Create deployment record (GitHub Deployments API)
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          state: success
          environment-url: https://${{ secrets.PRIMARY_DOMAIN }}
          deployment-id: ${{ github.run_id }}
