# CI/CD: build images, push to registry, and deploy via SSH Docker Compose
# Requires repository secrets: DOCKER_REGISTRY_USER, DOCKER_REGISTRY_PASSWORD, SSH_DEPLOY_HOST, SSH_DEPLOY_USER, SSH_DEPLOY_PRIVATE_KEY
name: CI/CD Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/swarmenterprise-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.DOCKER_REGISTRY_HOST || 'ghcr.io' }}
          username: ${{ secrets.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH and Docker Compose
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SSH_DEPLOY_HOST }}
          username: ${{ secrets.SSH_DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_PRIVATE_KEY }}
          script: |
            set -e
            # deployment directory on remote host
            DEPLOY_DIR=/srv/swarmenterprise
            if [ ! -d "$DEPLOY_DIR" ]; then mkdir -p "$DEPLOY_DIR"; fi
            cd "$DEPLOY_DIR"
            # clone or update repo (public clone over https)
            if [ -d .git ]; then
              git fetch --all --prune
              git reset --hard origin/main
            else
              git clone https://github.com/${{ github.repository }} .
            fi
            # ensure Docker Compose v2 is available, then pull and restart
            docker compose pull
            docker compose up -d --remove-orphans

