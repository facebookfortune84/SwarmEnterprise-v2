# Prometheus Configuration for SwarmEnterprise v2
# Self-hosted monitoring - completely free

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'swarm-enterprise'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "alerts/*.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # FastAPI Backend
  - job_name: 'backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']
        labels:
          service: 'backend'
          component: 'api'
    scrape_interval: 10s

  # PostgreSQL
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
        labels:
          service: 'postgres'
          component: 'database'

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: 'redis'
          component: 'cache'

  # MinIO
  - job_name: 'minio'
    metrics_path: '/minio/v2/metrics/cluster'
    static_configs:
      - targets: ['minio:9000']
        labels:
          service: 'minio'
          component: 'storage'
    scrape_interval: 30s

  # Caddy
  - job_name: 'caddy'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['caddy:2019']
        labels:
          service: 'caddy'
          component: 'proxy'

  # ChromaDB
  - job_name: 'chromadb'
    static_configs:
      - targets: ['chromadb:8000']
        labels:
          service: 'chromadb'
          component: 'vectordb'

  # Celery Workers
  - job_name: 'celery'
    static_configs:
      - targets: ['celery_worker:9091']
        labels:
          service: 'celery'
          component: 'worker'

  # Node Exporter (if installed)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
          component: 'system'

  # Docker containers (if cAdvisor is installed)
  - job_name: 'docker'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'cadvisor'
          component: 'containers'

  # Ollama (on laptop)
  - job_name: 'ollama'
    static_configs:
      - targets: ['192.168.1.100:11434']  # Replace with your laptop IP
        labels:
          service: 'ollama'
          component: 'llm'
    scrape_interval: 30s
    scrape_timeout: 10s

