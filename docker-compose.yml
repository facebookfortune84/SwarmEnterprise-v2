
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://swarm:swarm@db:5432/swarm
      REDIS_URL: redis://redis:6379/0
    restart: always

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: swarm
      POSTGRES_USER: swarm
      POSTGRES_PASSWORD: swarm
    restart: always

  redis:
    image: redis:7-alpine
    restart: always
