# SwarmEnterprise SSH hardening — sshd_config drop-in
# Deploy to: /etc/ssh/sshd_config.d/99-swarmenterprise.conf
# Then reload: sudo systemctl reload sshd
#
# Requires OpenSSH 8.2+ (Ubuntu 20.04+, Debian 11+).
# All authorised public keys must be in ~/.ssh/authorized_keys before applying.

# Disable password-based logins entirely
PasswordAuthentication no

# Prevent direct root login over SSH
PermitRootLogin no

# Require public-key authentication only (no keyboard-interactive, no GSSAPI)
AuthenticationMethods publickey

# Limit brute-force window: disconnect after 3 bad attempts
MaxAuthTries 3

# Disconnect unauthenticated connections after 20 seconds
LoginGraceTime 20

# Disable X11 forwarding (not needed on a server)
X11Forwarding no

# Disable SSH agent forwarding (prevents credential leakage via compromised hosts)
AllowAgentForwarding no

# Disable TCP forwarding unless a specific tunnel need arises
AllowTcpForwarding no

# Reduce idle session timeout: send keepalive every 5 minutes, disconnect after 3 missed replies
ClientAliveInterval 300
ClientAliveCountMax 3

# Use a non-default banner (deters automated scanners)
Banner /etc/ssh/swarmenterprise_banner

# Log authentication attempts at verbose level for auditability
LogLevel VERBOSE
